<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- left loop - thick ribbon -->
  <path
    d="M32 30C26 12 6 14 6 26c0 9 10 14 20 12 4-1 6-3 6-8z"
    fill="#8fbc9a"
    stroke="#2f5540"
    stroke-width="3"
    stroke-linejoin="round"
  />
  <!-- right loop -->
  <path
    d="M32 30c6-18 26-16 26-4 0 9-10 14-20 12-4-1-6-3-6-8z"
    fill="#b8e0c2"
    stroke="#2f5540"
    stroke-width="3"
    stroke-linejoin="round"
  />
  <!-- left tail -->
  <path
    d="M28 34c-2 8-8 16-14 20"
    stroke="#3d6b4f"
    stroke-width="5"
    stroke-linecap="round"
  />
  <path
    d="M28 34c-2 8-8 16-14 20"
    stroke="#8fbc9a"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- right tail -->
  <path
    d="M36 34c2 8 8 16 14 20"
    stroke="#2f5540"
    stroke-width="5"
    stroke-linecap="round"
  />
  <path
    d="M36 34c2 8 8 16 14 20"
    stroke="#a8d4b4"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- knot -->
  <circle cx="32" cy="30" r="8" fill="#2f5540"/>
  <circle cx="32" cy="30" r="5" fill="#b8e0c2"/>
  <circle cx="32" cy="30" r="2.2" fill="#e7efe9"/>
</svg>
