# Render Blueprint for the Rentora backend (free tier).
# render.com -> New -> Blueprint -> pick this repo.
services:
  - type: web
    name: rentora-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        value: sqlite:///./rentora.db
      # Production frontend (also allowed via vercel.app regex in CORS middleware)
      - key: CORS_ORIGINS
        value: https://rentora-btu.vercel.app
