# Render Blueprint for the Rentora backend (free tier).
# render.com -> New -> Blueprint -> pick this repo.
services:
  - type: web
    name: rentora-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        value: sqlite:///./rentora.db
      # After the frontend is live, set this to your Vercel URL, e.g. https://rentora.vercel.app
      - key: CORS_ORIGINS
        value: http://localhost:5173
